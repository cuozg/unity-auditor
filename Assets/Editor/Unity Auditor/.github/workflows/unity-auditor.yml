# Unity Auditor — GitHub Actions Workflow
#
# Drop this file into your Unity project's .github/workflows/ folder.
# It runs unity_auditor.py on every PR targeting main/develop and
# posts inline GitHub annotations for all findings.
#
# Prerequisites:
#   1. Copy the Scripts/ folder into your Unity project root (or any location).
#   2. Set ASSETS_ROOT below to the correct path relative to your repo root.
#   3. Python 3.9+ is available on all GitHub-hosted runners by default.
#
# Outputs:
#   - Terminal report (visible in the workflow log)
#   - GitHub Actions annotations (appear inline in the PR Files tab)
#   - SARIF v2.1 uploaded to GitHub Security / Code Scanning tab
#   - JSON artifact for downstream consumers

name: Unity Auditor

on:
  pull_request:
    branches:
      - main
      - develop
      - "release/**"
    # Run only when C#, prefab, scene, or asset files change
    paths:
      - "Assets/**/*.cs"
      - "Assets/**/*.prefab"
      - "Assets/**/*.unity"
      - "Assets/**/*.mat"
      - "Assets/**/*.anim"
      - "Assets/**/*.controller"
      - "Assets/**/*.fbx"
      - "Assets/**/*.meta"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      assets_root:
        description: "Path to Assets/ folder (default: Assets)"
        required: false
        default: "Assets"
      fail_on:
        description: "Fail on severity: P0 | P1 | P2 | none"
        required: false
        default: "P1"

env:
  # ──────────────────────────────────────────────────────────────────────────
  # CONFIGURE THESE for your repo layout:
  ASSETS_ROOT: Assets                     # relative to repo root
  SCRIPT_PATH: Scripts/unity_auditor.py   # relative to repo root
  FAIL_ON: P1                             # P0 | P1 | P2 | none
  # ──────────────────────────────────────────────────────────────────────────

jobs:
  unity-auditor:
    name: Unity Auditor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write    # needed to post PR comments / annotations
      security-events: write  # needed to upload SARIF to Code Scanning

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch enough history for git blame / diff context
          fetch-depth: 0

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Run Unity Auditor (annotations + terminal report) ────────────────
      - name: Run Unity Auditor
        id: review
        run: |
          python "${{ env.SCRIPT_PATH }}" \
            "${{ env.ASSETS_ROOT }}" \
            --github-annotations \
            --sarif /tmp/unity-auditor.sarif.json \
            --json  /tmp/unity-auditor.json \
            --fail-on "${{ env.FAIL_ON }}"
        # Don't fail the step yet — we want to upload artifacts first
        continue-on-error: true
        env:
          # Pass workflow_dispatch override if provided
          ASSETS_ROOT: ${{ github.event.inputs.assets_root || env.ASSETS_ROOT }}
          FAIL_ON:     ${{ github.event.inputs.fail_on     || env.FAIL_ON }}

      # ── 4. Upload SARIF to GitHub Security / Code Scanning tab ──────────────
      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/unity-auditor.sarif.json
          category: unity-auditor
        continue-on-error: true   # Don't fail if SARIF upload is unavailable

      # ── 5. Upload JSON report as build artifact ──────────────────────────────
      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-auditor-${{ github.run_number }}
          path: /tmp/unity-auditor.json
          retention-days: 30

      # ── 6. Enforce exit code from the review step ────────────────────────────
      #    This makes the audit check actually block merging on P0/P1 findings.
      - name: Enforce audit result
        if: steps.review.outcome == 'failure'
        run: |
          echo "::error::Unity Auditor found P0/P1 issues — see annotations above."
          exit 1
